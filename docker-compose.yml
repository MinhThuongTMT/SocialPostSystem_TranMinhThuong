services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_post_api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://admin:password@mongo:27017
      - REDIS_URL=redis://redis:6379
      - DATABASE_NAME=social_post_db
      - API_TITLE=Social Post System API
      - API_VERSION=1.0.0
      - SECRET_KEY=your-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - mongo
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - social_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: social_post_mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=social_post_db
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - social_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: social_post_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - social_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: MongoDB Express for visual database management
  mongo-express:
    image: mongo-express:latest
    container_name: social_post_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:password@mongo:27017/
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
    depends_on:
      - mongo
    networks:
      - social_network

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  social_network:
    driver: bridge
